<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cisco Python Essentials & CodeTantra Lab Portfolio</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0284c7;
        --border: rgba(148, 163, 184, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #e2effa 0%, #f8fafc 100%);
        color: var(--text);
      }

      .card {
        width: min(100%, 420px);
        padding: 28px 26px;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 1.9rem;
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.7;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 48px;
        border-radius: 999px;
        border: none;
        padding: 0 1rem;
        font-weight: 700;
        background: linear-gradient(135deg, #38bdf8, #22d3ee);
        color: #0f172a;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(56, 189, 248, 0.18);
      }

      .note {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>My GitHub Portfolio</h1>
      <p>Explore my Cisco Python Essentials and CodeTantra lab work in one place. Click the button below to open the repository.</p>
      <a class="button" href="https://github.com/atharvawaghole2007-stack/EDS-Repo" target="_blank" rel="noreferrer noopener">Open GitHub Repository</a>
      <p class="note">Replace the link with your actual GitHub repo URL.</p>
    </article>
  </body>
</html>
